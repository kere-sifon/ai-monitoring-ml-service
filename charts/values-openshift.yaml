# OpenShift-specific values override
# Use with: helm install ml-service ./charts -f charts/values.yaml -f charts/values-openshift.yaml

replicaCount: 1

image:
  repository: ghcr.io/keresifon/ai-monitoring-ml-service
  pullPolicy: IfNotPresent
  tag: "1.0.1"

# OpenShift uses Routes instead of Ingress
openshift:
  enabled: true
  route:
    enabled: true
    host: ""  # Auto-generated by OpenShift
    annotations:
      haproxy.router.openshift.io/timeout: 60s
    tls:
      enabled: true
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
  securityContext:
    fsGroup: 1000
    runAsNonRoot: true

# OpenShift manages security contexts automatically
# Remove explicit runAsUser/runAsGroup from deployment

resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

persistence:
  enabled: false
  # For OpenShift, use storageClass appropriate for your cluster
  # Common options: gp2, gp3, ocs-storagecluster-ceph-rbd
  storageClass: ""
  size: 5Gi
  accessMode: ReadWriteOnce

